<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>斯芬克斯貓（Sphynx Cat）</title>
    <link rel="stylesheet" href="about-cat/Sphynx Cat.css">
</head>
<body>

<div class="container py-5">
    <div class="row breed-item justify-content-center">
        <div class="col-12 mb-5">
            <img src="https://images.openai.com/static-rsc-4/Z6EYEKXSA2Igx8I_1-15jPnH0G5HYtq59HH4uho2_hon1u8zfjmaX3QG9JInHbpIl8iBrmblNgjBHTSJ2ESBJUTtcxGtwN8-ATmDkyIFU4Hkzqr5EmF1_3GDweKJGTQTFouWl2oquubzsFgARjfInuye2Ji_jGGVpMN07YERwgcwlol0Z6qRi4eGxZl1zRwf?purpose=fullsize"
                 alt="起源">
        </div>
        <div class="col-12 col-lg-8">
            <span class="section-number">HISTORY</span>
            <h2>起源與發展</h2>
            <p>斯芬克斯貓最早出現在 1960 年代的加拿大，
                由自然突變產生的無毛小貓開始繁育。
                並於1980年代逐漸被國際認可。</p>
        </div>
    </div>

    <div class="row breed-item justify-content-center">
        <div class="col-12">
            <img src="https://images.openai.com/static-rsc-4/PTE3AHXWwn6IvPAoV_p8FqKNZouziIJK3zaNWemQSpg6vQnZm5yeszuU4kbuRftCpuNITGbcOQxogsz-vZFuC6GZ7tDOSyCtOdcdz3Uemx_nWQMGYdV3QBgPRKErHGPOq71AMxZlpyWtaM3Pjpn4VCU0p4wNlFWiDHGI-_Dhkp7xdzfTF8nIvhVA2p4dYNNH?purpose=fullsize"
                 alt="外觀">
        </div>
        <div class="col-12 col-lg-8">
            <span class="section-number">LOOK</span>
            <h2>外觀特徵</h2>
            <ul class="feature-list list-unstyled">
                <li>幾乎完全無毛（僅細絨）</li>
                <li>皮膚皺褶明顯</li>
                <li>肌肉線條清晰</li>
                <li>大耳朵與檸檬形眼睛</li>
                <li>體溫比一般貓略高</li>
            </ul>
        </div>
    </div>

    <div class="breed-stats">
        <div class="stat-item">
            <span class="icon">📏</span>
            <div>
                <h5>體型</h5>
                <p>中型肌肉型</p>
            </div>
        </div>

        <div class="stat-item">
            <span class="icon">⏳</span>
            <div>
                <h5>壽命</h5>
                <p>8～14年</p>
            </div>
        </div>

        <div class="stat-item">
            <span class="icon">⚖️</span>
            <div>
                <h5>體重</h5>
                <p>3～6kg</p>
            </div>
        </div>

        <div class="stat-item">
            <span class="icon">❤️</span>
            <div>
                <h5>性格</h5>
                <p>外向親人</p>
            </div>
        </div>
    </div>

    <div class="breed-ending mt-5">
        <h2>「最具未來感的無毛貓」</h2>
        <p>斯芬克斯貓以獨特外觀與親人性格著稱，是最具辨識度的現代貓種之一。</p>
    </div>

</div>

<script src="js/bootstrap.js"></script>
</body>
</html>
