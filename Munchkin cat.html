<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>曼赤肯貓（Munchkin cat）</title>
    <link rel="stylesheet" href="about-cat/Munchkin cat.css">
</head>
<body>

<div class="container py-5">
    <div class="row breed-item justify-content-center">
        <div class="col-12 mb-5">
            <img src="https://images.openai.com/static-rsc-4/5vqFSdr2ElYFTgcuZ_-DFf8eipB56ykFIWThXvOIMc6Q4BVFXKnRLSnmbjaWpCm-3BBOpxabKhU_mejAd2zPZ4EKu9aMcIATOgyK0l4GIeEjpe6xpMLiN27MfPNCHbrB8OCzVlw5-DW2X3_aC6XRHTKeF1epvW2pYXkst_uJYYn-9M_2Yb7UAY7XiU06Zxg_?purpose=fullsize"
                 alt="起源">
        </div>
        <div class="col-12 col-lg-8">
            <span class="section-number">HISTORY</span>
            <h2>起源與發展</h2>
            <p>曼赤肯貓起源於1980年代美國路易斯安那州，
                一隻名為 Blackberry 的短腿母貓被發現並開始繁殖。
                後續研究確認其短腿為自然基因突變，
                並於1994年正式納入品種。</p>
        </div>
    </div>

    <div class="row breed-item justify-content-center">
        <div class="col-12">
            <img src="https://images.openai.com/static-rsc-4/EWGk-wMuwGlE9TkSO9nIyt36Qude54NRiMRLv_qpPrz3QOKRGVxfwgJNxIwCI9967L3qg1TFh7ntTaZZdYQ8CvM05sLrcyGAwuZzavUDaPmEeq1_Mh19Q93vEc3fZjR-xsxRxYuP_nvF_oo7x1bBd8m8ODkPI_G0vtPvpxS0GvbV96zD1QkW6zVUNzb3t-VO?purpose=fullsize"
                 alt="外觀">
        </div>
        <div class="col-12 col-lg-8">
            <span class="section-number">LOOK</span>
            <h2>外觀特徵</h2>
            <ul class="feature-list list-unstyled">
                <li>四肢短小但結實</li>
                <li>身體比例較長</li>
                <li>眼睛大而圓</li>
                <li>毛色與花紋多樣</li>
                <li>短毛與長毛皆有</li>
            </ul>
        </div>
    </div>

    <div class="breed-stats">
        <div class="stat-item">
            <span class="icon">📏</span>
            <div>
                <h5>體型</h5>
                <p>中型</p>
            </div>
        </div>

        <div class="stat-item">
            <span class="icon">⏳</span>
            <div>
                <h5>壽命</h5>
                <p>12～15年</p>
            </div>
        </div>

        <div class="stat-item">
            <span class="icon">⚖️</span>
            <div>
                <h5>體重</h5>
                <p>2～5kg</p>
            </div>
        </div>

        <div class="stat-item">
            <span class="icon">❤️</span>
            <div>
                <h5>性格</h5>
                <p>活潑親人</p>
            </div>
        </div>
    </div>

    <div class="breed-ending mt-5">
        <h2>「最具特色的短腿萌系貓」</h2>
        <p>曼赤肯貓以可愛外型與活潑個性著稱，是最受歡迎的特殊品種之一。</p>
    </div>

</div>

<script src="js/bootstrap.js"></script>
</body>
</html>
