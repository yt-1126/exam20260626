<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>伯曼貓（Birman）</title>
    <link rel="stylesheet" href="about-cat/Birman.css">
</head>
<body>

<div class="container py-5">
    <div class="row breed-item justify-content-center">
        <div class="col-12 mb-5">
            <img src="https://images.openai.com/static-rsc-4/dx4doZQSn7lCJu0pU5aPRwFZbouGnKgez5qKxxWbMGz-vFYzJ9nUME89-UVG4OSVXyj2zeLpE9aXXb35TtyTPOZuQzCuCHB2gbr8bE2SShMONWX2oU9YeZRVDpxG_-cTC4DKBVc14N8LpR54V4pjoSvaIV1lvasTsul_F_zgP0zlI0bt7wrxQ0rXNjouHXrO?purpose=fullsize"
                 alt="起源">
        </div>
        <div class="col-12 col-lg-8">
            <span class="section-number">HISTORY</span>
            <h2>起源與發展</h2>
            <p> 伯曼貓傳說起源於拉奧山（Lao-Tsun）的寺廟，被視為守護神聖貓種。
                20世紀初被帶入進行繁殖，並逐漸建立現代品種標準。
                二戰後數量一度銳減，經歐洲育種者復育後重新普及，
                現已成為國際認可品種。</p>
        </div>
    </div>

    <div class="row breed-item justify-content-center">
        <div class="col-12">
            <img src="https://images.openai.com/static-rsc-4/yZfoD7Q9nNJYRGBUNi9NYeCYagHy_soA__GLGerADWtkfbqOal0nFluTLDVBnZPsVgKEl3-Om47WuVswmrz7wCGaV2ElAFJESfz6CWS5rAdBNRHbNwlD9I7SNfgBDuH914kTcIzxTVsUiVsDSUrC6LKHpJdFGrbUPGpQarM1cFW9FJfk1ECYYVV3MvDWljlx?purpose=fullsize"
                 alt="外觀">
        </div>
        <div class="col-12 col-lg-8">
            <span class="section-number">LOOK</span>
            <h2>外觀特徵</h2>
            <ul class="feature-list list-unstyled">
                <li>中長毛、柔軟絲滑</li>
                <li>標誌性「白手套」腳部</li>
                <li>深藍色大眼睛</li>
                <li>重點色毛（類似暹羅貓）</li>
                <li>體態結實但不厚重</li>
            </ul>
        </div>
    </div>

    <div class="breed-stats">
        <div class="stat-item">
            <span class="icon">📏</span>
            <div>
                <h5>體型</h5>
                <p>中大型</p>
            </div>
        </div>

        <div class="stat-item">
            <span class="icon">⏳</span>
            <div>
                <h5>壽命</h5>
                <p>12～16年</p>
            </div>
        </div>

        <div class="stat-item">
            <span class="icon">⚖️</span>
            <div>
                <h5>體重</h5>
                <p>4～7kg</p>
            </div>
        </div>

        <div class="stat-item">
            <span class="icon">❤️</span>
            <div>
                <h5>性格</h5>
                <p>溫和親人</p>
            </div>
        </div>
    </div>

    <div class="breed-ending mt-5">
        <h2>「溫柔與優雅的聖貓」</h2>
        <p> 伯曼貓以藍眼與白手套著稱，是兼具神話色彩與家庭友善的經典貓種。</p>
    </div>

</div>

<script src="js/bootstrap.js"></script>
</body>
</html>
