<body>

<div class="container py-5">
    <div class="row breed-item justify-content-center">
        <div class="col-12 mb-5">
            <img src="https://images.openai.com/static-rsc-4/UqmjBfTJfXLZOSAu6NpfaiwjGTt9AwCWeLem5Hm98TM3N4oPht8InrFQWh_h0qEYMMVbpgw0msjFncc7g1CRIWnq6JtjiTvS3OcgqvKjNFG5Aw1EUc8hoEDIBrvMRKONeiXAR-3T7l_Ha2ZFfHXn-gVlzc5byB_hPugzm8viqzjaz_N-yeshE7JkgkGjl4_c?purpose=fullsize"
                 alt="起源">
        </div>
        <div class="col-12 col-lg-8">
            <span class="section-number">HISTORY</span>
            <h2>起源與發展</h2>
            <p>土耳其安哥拉貓起源於安卡拉地區，
                是歷史最悠久的天然長毛貓之一。
                16～17世紀傳入歐洲後，成為貴族喜愛的象徵貓種，
                並在現代貓繁育史中扮演重要角色。</p>
        </div>
    </div>

    <div class="row breed-item justify-content-center">
        <div class="col-12">
            <img src="https://images.openai.com/static-rsc-4/eJjr86IUUfgqAaIZsEEIYuOgtm8ALhgSWgnVdcWSpmmYbyIGClI6FrK7Se0wq4EdaRnil5Wo4DS_sIGVMg9LqHuu0aMsx5zFcS-BrAGbJBI4xXNI6Ko_awtRKSFx9Ih8yrQoEtk-CYI26thml3KhehBM1mTgi2ws2jsqilQjNcdNTeTVVJ57FNi0i-axBRb_?purpose=fullsize"
                 alt="外觀">
        </div>
        <div class="col-12 col-lg-8">
            <span class="section-number">LOOK</span>
            <h2>外觀特徵</h2>
            <ul class="feature-list list-unstyled">
                <li>絲滑長毛（無厚重底毛）</li>
                <li>修長優雅身形</li>
                <li>羽毛狀蓬鬆尾巴</li>
                <li>藍眼或異色瞳（常見）</li>
                <li>頭型呈倒三角形</li>
            </ul>
        </div>
    </div>

    <div class="breed-stats">
        <div class="stat-item">
            <span class="icon">📏</span>
            <div>
                <h5>體型</h5>
                <p>中小型</p>
            </div>
        </div>

        <div class="stat-item">
            <span class="icon">⏳</span>
            <div>
                <h5>壽命</h5>
                <p>12～18年</p>
            </div>
        </div>

        <div class="stat-item">
            <span class="icon">⚖️</span>
            <div>
                <h5>體重</h5>
                <p>2.5～5kg</p>
            </div>
        </div>

        <div class="stat-item">
            <span class="icon">❤️</span>
            <div>
                <h5>性格</h5>
                <p>聰明活潑</p>
            </div>
        </div>
    </div>

    <div class="breed-ending mt-5">
        <h2>「最優雅的古老長毛貓」</h2>
        <p>土耳其安哥拉貓以高貴氣質與悠久歷史著稱，是長毛貓品種的重要起源之一。</p>
    </div>

</div>
