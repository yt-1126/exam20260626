<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>暹羅貓（Siamese Cat）</title>
    <link rel="stylesheet" href="about-cat/Siamese Cat.css">
</head>
<body>

<div class="container py-5">
    <div class="row breed-item justify-content-center">
        <div class="col-12 mb-5">
            <img src="https://images.openai.com/static-rsc-4/pmD_M1ZK3XpreK2y9FZgybIeBcUVsDrVaTSSGw6SQPfcakVw4jB8a8H7tiw3q__ChKbHtGzZS8bezQCEelqdpcdW6fE5ng6zNxpiDnX9S99-vsN9uupjizCnZfuEShSXFzGEZ11-jzi-yPzapakMNgZr2a2ZxKmBu4zRzK1iAC66jedQukn7o_YHXfYGRr1J?purpose=fullsize"
                 alt="起源">
        </div>
        <div class="col-12 col-lg-8">
            <span class="section-number">HISTORY</span>
            <h2>起源與發展</h2>
            <p>暹羅貓起源於泰國王室與寺廟文化，
                早期被視為神聖與吉祥的象徵。
                19 世紀末由英國外交官帶回歐洲後迅速走紅，
                成為西方世界最早認識的亞洲貓種之一，
                並影響許多現代短毛貓的發展。</p>
        </div>
    </div>

    <div class="row breed-item justify-content-center">
        <div class="col-12">
            <img src="https://images.openai.com/static-rsc-4/U_bBCbZLN3isUZ1Y5DkbNRskQSQnaLijbmqdihMu8Voo9TgdgLcoul_iYOkqpIF43BdJwtrLqWKr3i0jf-enyZTrn_qc7bFViGsKVi-7ZA6K1kcGmadfV88x788bNMjIHc9kPvmmV4uCng1L8f39dANhnwEEQsS2iYAdTke7IqIYgrGMCZVzDUwd6PomzvJk?purpose=fullsize"
                 alt="外觀">
        </div>
        <div class="col-12 col-lg-8">
            <span class="section-number">LOOK</span>
            <h2>外觀特徵</h2>
            <ul class="feature-list list-unstyled">
                <li>藍色杏仁形眼睛</li>
                <li>重點色毛髮（耳、臉、尾、四肢較深）</li>
                <li>修長身形與長腿</li>
                <li>尖耳與細長尾巴</li>
                <li>毛短且貼身</li>
            </ul>
        </div>
    </div>

    <div class="breed-stats">
        <div class="stat-item">
            <span class="icon">📏</span>
            <div>
                <h5>體型</h5>
                <p>中型偏瘦</p>
            </div>
        </div>

        <div class="stat-item">
            <span class="icon">⏳</span>
            <div>
                <h5>壽命</h5>
                <p>12～20年</p>
            </div>
        </div>

        <div class="stat-item">
            <span class="icon">⚖️</span>
            <div>
                <h5>體重</h5>
                <p>2.5～5.5kg</p>
            </div>
        </div>

        <div class="stat-item">
            <span class="icon">❤️</span>
            <div>
                <h5>性格</h5>
                <p>活潑親人</p>
            </div>
        </div>
    </div>

    <div class="breed-ending mt-5">
        <h2>「最會與人交流的藍眼貓」</h2>
        <p>暹羅貓以高社交性與優雅外型聞名，是最具代表性的東方貓種之一。</p>
    </div>

</div>

<script src="js/bootstrap.js"></script>
</body>
</html>
