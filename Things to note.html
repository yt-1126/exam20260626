<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>注意事項</title>
    <link rel="stylesheet" href="css/bootstrap.css">
    <link rel="stylesheet" href="startbootstrap-creative-gh-pages/css/styles.css">
</head>
<body>

<section id="tips" class="container py-5">

    <h2 class="text-center mb-5">⚠️ 注意事項</h2>

    <div class="row align-items-center mb-5">
        <div class="col-md-6">
            <h4>剛到新家的適應期</h4>
            <p>貓咪剛換環境時會緊張，需要時間適應</p>
            <span>🐾 建議做法</span>
            <ul>
                <li>提供安靜躲藏空間（紙箱、貓窩）</li>
                <li>不要強行抱牠或一直打擾</li>
                <li>讓牠自己慢慢探索環境</li>
                <li>保持食物與水固定位置</li>
            </ul>
        </div>
        <p>⏳ 適應期通常：3天～2週</p>
        <div class="col-md-6">
            <img src="img/cat-food-warning.jpg" class="img-fluid rounded">
        </div>
    </div>

    <div class="alert alert-danger">
        ⚠️ 貓咪不能吃人類藥物或含酒精食品！
    </div>

    <div class="row align-items-center flex-md-row-reverse mt-5">
        <div class="col-md-6">
            <h4>🍽️ 飲食注意</h4>
            <p>窗戶需防護，避免貓咪墜樓或走失。</p>
        </div>
        <div class="col-md-6">
            <img src="img/cat-home.jpg" class="img-fluid rounded">
        </div>
    </div>

</section>

            <script src="js/bootstrap.js"></script>
            <script src="startbootstrap-creative-gh-pages/js/scripts.js"></script>
</body>
</html>
