<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>我家的貓</title>

    <link rel="stylesheet" href="css/bootstrap.css">
    <link rel="stylesheet" href="startbootstrap-creative-gh-pages/css/styles.css">
    <link rel="stylesheet" href="my cat/my cat.css">
</head>
<body>

<section id="my-cat" class="py-5" style="background-color: #fafafa;">
    <div class="container">

        <div class="text-center mb-5">
            <span class="badge bg-dark px-3 py-2 rounded-5 mb-2">主子駕到</span>
            <h2 class="fw-bold text-dark">本喵特別介紹</h2>
            <hr class="mx-auto" style="width: 50px; border-top: 3px solid #ff5722; opacity: 1;">
        </div>

        <div class="row align-items-center g-5">

            <div class="col-12 col-md-5">
                <div class="position-relative shadow-lg rounded-4 overflow-hidden bg-white">
                    <div class="ratio ratio-1x1">
                        <img src="https://i.postimg.cc/jSSGhfKJ/442e09d4-aced-4d5e-8005-019491f43fab.jpg" class="object-fit-cover" alt="我最愛的貓">
                    </div>
                    <div class="position-absolute bottom-0 start-0 w-100 bg-dark bg-opacity-50 text-white text-center py-3 backdrop-blur">
                        <h3 class="fw-bold mb-0">可樂(Cola)</h3>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-7">
                <div class="p-4 bg-white rounded-4 shadow-sm">

                    <h4 class="fw-bold text-dark mb-4">🐾 關於這隻傲嬌生物...</h4>

                    <div class="row row-cols-2 g-3 mb-4">
                        <div class="col">
                            <div class="p-3 bg-light rounded-3 text-center">
                                <small class="text-muted d-block">品種</small>
                                <strong class="text-dark">米克斯 (虎斑小白襪)</strong>
                            </div>
                        </div>
                        <div class="col">
                            <div class="p-3 bg-light rounded-3 text-center">
                                <small class="text-muted d-block">年齡</small>
                                <strong class="text-dark">2 歲 (貓界青少年)</strong>
                            </div>
                        </div>
                        <div class="col">
                            <div class="p-3 bg-light rounded-3 text-center">
                                <small class="text-muted d-block">最愛食物</small>
                                <strong class="text-dark">凍乾、罐頭、肉泥</strong>
                            </div>
                        </div>
                        <div class="col">
                            <div class="p-3 bg-light rounded-3 text-center">
                                <small class="text-muted d-block">家裡地位</small>
                                <strong class="text-danger fw-bold">菜鳥小弟 (地位最小)</strong>
                            </div>
                        </div>
                    </div>

                    <div class="text-secondary small lh-lg">
                        <p class="custom-justify">
                            可樂是在 2024 年在學校被老師撿到領養回來的。外表看起來像個優雅的紳士，但內心其實住著一隻精力旺盛的猴子。每天最期待的事情就是奴才到吃飯時間開罐頭的瞬間及互動時間，只要晚了一分鐘，就會發出極具穿透力的抗議叫聲。
                        </p>
                        <p class="custom-justify mb-0">
                            【特殊技能】用無辜的眼神逃過所有做錯事的指責。雖然傲嬌，但常常靠過來踏踏、撒嬌的瞬間，還是讓人覺得一切都融化了。
                        </p>
                    </div>

                </div>
            </div>

        </div> </div>
</section>


<script src="js/bootstrap.js"></script>
<script src="startbootstrap-creative-gh-pages/js/scripts.js"></script>
</body>
</html>
