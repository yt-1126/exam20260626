<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>異國短毛貓（Exotic Shorthair）</title>
    <link rel="stylesheet" href="about-cat/Exotic Shorthair.css">
</head>
<body>

<div class="container py-5">
    <div class="row breed-item justify-content-center">
        <div class="col-12 mb-5">
            <img src="https://images.openai.com/static-rsc-4/tRHoD8MlzIDLgxi4toZ8z5VvVjeM1RRgTZCmtqp5oOwAFlINPIH-FNHKc5Nwc3Z6dqHsid2Sy9kq52CitsJz6IP7pLcjcutPfQD7lIdmXKManvkNqEV2mfA0OtAiRb0wDlFryLag__48IhS5UaHptL05SmDAMq74gko1WVZp-bCTnnJWffVuR2oNZdcIIHKF?purpose=fullsize"
                 alt="起源">
        </div>
        <div class="col-12 col-lg-8">
            <span class="section-number">HISTORY</span>
            <h2>起源與發展</h2>
            <p>異國短毛貓於1960年代在美國培育，
                由波斯貓與美國短毛貓交配而成，
                目標是打造「短毛版波斯貓」。
                1966年被正式承認為獨立品種，
                後續逐步回歸波斯貓血統，使外型更加圓潤可愛</p>
        </div>
    </div>

    <div class="row breed-item justify-content-center">
        <div class="col-12">
            <img src="https://images.openai.com/static-rsc-4/3Op-fE8ppG9kO7oDG9BPCEl77jPdDDVpwDWK470317ACdC8SofDbYiPsohDKseWLArlwEoOg15UKpcsomkri2I_4b01_X9weaZBKJiZ16oTnjQs3nvAg5bGeoDt8_U2UEPM-ECxFmBd4thKi7US8njcI7dUbR0KTbDxXg9lx7TfPeouOcT3WoCY96zes5eho?purpose=fullsize"
                 alt="外觀">
        </div>
        <div class="col-12 col-lg-8">
            <span class="section-number">LOOK</span>
            <h2>外觀特徵</h2>
            <ul class="feature-list list-unstyled">
                <li>圓臉、短鼻、呆萌表情</li>
                <li>眼睛大而圓，表情溫柔</li>
                <li>短而濃密的絨毛</li>
                <li>身體結實、四肢短粗</li>
                <li>外型與波斯貓極為相似</li>
            </ul>
        </div>
    </div>

    <div class="breed-stats">
        <div class="stat-item">
            <span class="icon">📏</span>
            <div>
                <h5>體型</h5>
                <p>中型偏壯</p>
            </div>
        </div>

        <div class="stat-item">
            <span class="icon">⏳</span>
            <div>
                <h5>壽命</h5>
                <p>8–13年</p>
            </div>
        </div>

        <div class="stat-item">
            <span class="icon">⚖️</span>
            <div>
                <h5>體重</h5>
                <p>3–6.5kg</p>
            </div>
        </div>

        <div class="stat-item">
            <span class="icon">❤️</span>
            <div>
                <h5>性格</h5>
                <p>溫順安靜</p>
            </div>
        </div>
    </div>

    <div class="breed-ending mt-5">
        <h2>「安靜、療癒、像玩偶一樣的陪伴貓」</h2>
        <p> 異國短毛貓是喜歡安靜生活者的理想選擇。</p>
    </div>

</div>

<script src="js/bootstrap.js"></script>
</body>
</html>
