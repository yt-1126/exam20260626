<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>索馬利貓（Somali Cat）</title>
    <link rel="stylesheet" href="about-cat/Somali Cat.css">
</head>
<body>

<div class="container py-5">
    <div class="row breed-item justify-content-center">
        <div class="col-12 mb-5">
            <img src="https://images.openai.com/static-rsc-4/oy-G5AH7QFVQokgWShdr-Zvn4aWIE0yJkXLvF2YZTkoZ7tGQAx4Re_AwZsWk3toQvYuAFYET26bE7vnv8vPJYIb6F4OlaHhw-Yxzy2o5EA95A_76pEYdCpDmaZJH82yb3zJ0K_mwwQ-LFFB7xbwOT3YXIjbPxFWSTHQ1WCArSrLs2d1VEpSnIMh1eABTLiBn?purpose=fullsize"
                 alt="起源">
        </div>
        <div class="col-12 col-lg-8">
            <span class="section-number">HISTORY</span>
            <h2>起源與發展</h2>
            <p> 索馬利貓起源於加拿大與美國的阿比西尼亞貓繁育計畫，
                因隱性長毛基因而誕生。20世紀中期開始被刻意培育，
                並於1970年代逐漸被國際貓協會認可為獨立品種。</p>
        </div>
    </div>

    <div class="row breed-item justify-content-center">
        <div class="col-12">
            <img src="https://images.openai.com/static-rsc-4/rWvVeVwc2KetitYISr3XTLj7p7Xbo74gN-SKGO9Ny2N2UfZrcb2P0JzWjkPEPVKhkBlVekto-cGIomkwo6x5xg7P-D0rJh5efIUSSN1u1bZjqwsdRoudwBcLDCq_PfPOa7zE1sdeI3lSLm0XTfC3-59U8NFWKwN8gtNWYh6LHRlzlyJy9Us93TQxdX9CJ7H2?purpose=fullsize"
                 alt="外觀">
        </div>
        <div class="col-12 col-lg-8">
            <span class="section-number">LOOK</span>
            <h2>外觀特徵</h2>
            <ul class="feature-list list-unstyled">
                <li>蓬鬆長毛與狐狸尾巴</li>
                <li>明顯「漸層虎斑（ticking）」毛色</li>
                <li>杏仁形大眼睛</li>
                <li>大耳朵、表情靈動</li>
                <li>身形修長且靈活</li>
            </ul>
        </div>
    </div>

    <div class="breed-stats">
        <div class="stat-item">
            <span class="icon">📏</span>
            <div>
                <h5>體型</h5>
                <p>中型</p>
            </div>
        </div>

        <div class="stat-item">
            <span class="icon">⏳</span>
            <div>
                <h5>壽命</h5>
                <p>12～16年</p>
            </div>
        </div>

        <div class="stat-item">
            <span class="icon">⚖️</span>
            <div>
                <h5>體重</h5>
                <p>3～5kg</p>
            </div>
        </div>

        <div class="stat-item">
            <span class="icon">❤️</span>
            <div>
                <h5>性格</h5>
                <p>活潑聰明</p>
            </div>
        </div>
    </div>

    <div class="breed-ending mt-5">
        <h2>「最像小狐狸的貓咪」</h2>
        <p>索馬利貓以狐狸般外型與活潑性格著稱，是極具互動性與觀賞性的貓種。</p>
    </div>

</div>

<script src="js/bootstrap.js"></script>
</body>
</html>
