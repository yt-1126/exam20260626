<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8">
    <title>美國短毛貓（American Shorthair）</title>
    <link rel="stylesheet" href="about-cat/American%20Shorthair.css">
</head>
<body>
<div class="container py-5">

    <div class="row breed-item justify-content-center">
        <div class="col-12 mb-5">
            <img src="https://images.openai.com/static-rsc-4/vX9kk0DoZ4WdXNVkuHAPpkQWIhy2E2PENcPM8M156BBfYQ0f00XydgEsSM_QgzzQEAfevn7yskplRi6083LvTgoDJovgHQqsa1C9aSIF-hTt52ainn6k198ji11-XPkU5aO3EwLRYVxwwAYniwFQ5sFlazsJWx56QV11qTxQ0oB86hxEkcsnVVYnkM5zWK7A?purpose=fullsize"
                 alt="起源">
        </div>
        <div class="col-12 col-lg-8">
            <span class="section-number">HISTORY</span>
            <h2>起源與發展</h2>
            <p>美國短毛貓的祖先隨歐洲移民於17世紀來到北美，
                在農場與船隻上擔任捕鼠工作貓。
                經過長期自然繁育與品種改良後，
                逐漸形成今日穩定且健壯的美國短毛貓。</p>
        </div>
    </div>

    <div class="row breed-item justify-content-center">
        <div class="col-12">
            <img src="https://images.openai.com/static-rsc-4/fnAai5xklxmdmKymhnlsJGrGcBx23Ze3x_9UtOe0KUAl4s7PzURVW7WPVp7f1u5hQI32nRKo-JHjKScVYjvS4XDSSzeX3l0EfSwi38l8KyNlr-LtnApYSp6f34bDt9K2BqwLDhQrfeSX55dw_nITSF5Mh6z9AwNpybNA1DQefr_DX4c53C1xI9OS17CTfuwX?purpose=fullsize"
                 alt="外觀">
        </div>
        <div class="col-12 col-lg-8">
            <span class="section-number">LOOK</span>
            <h2>外觀特徵</h2>
            <ul class="feature-list list-unstyled">
                <li>體格結實、胸膛寬厚</li>
                <li>頭部圓潤、眼神有神</li>
                <li>短而密的被毛</li>
                <li>虎斑花紋最常見（銀虎斑最經典）</li>
                <li>毛色超過 80 種以上</li>
            </ul>
        </div>
    </div>

    <div class="breed-stats">
        <div class="stat-item">
            <span class="icon">📏</span>
            <div>
                <h5>體型</h5>
                <p>中大型</p>
            </div>
        </div>

        <div class="stat-item">
            <span class="icon">⏳</span>
            <div>
                <h5>壽命</h5>
                <p>15~20年</p>
            </div>
        </div>

        <div class="stat-item">
            <span class="icon">⚖️</span>
            <div>
                <h5>體重</h5>
                <p>3–7kg</p>
            </div>
        </div>

        <div class="stat-item">
            <span class="icon">❤️</span>
            <div>
                <h5>性格</h5>
                <p>溫和獨立、穩定、聰明且適應力強</p>
            </div>
        </div>
    </div>

    <div class="breed-ending mt-5">
        <h2>「穩定、聰明、最百搭的家庭貓」</h2>
        <p> 美國短毛貓能適應各種生活環境，是非常理想的長期伴侶。</p>
    </div>

</div>

<script src="js/bootstrap.js"></script>
</body>
</html>
