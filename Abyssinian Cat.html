<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>阿比西尼亞貓（Abyssinian Cat）</title>
    <link rel="stylesheet" href="about-cat/Abyssinian Cat.css">
</head>
<body>

<div class="container py-5">
    <div class="row breed-item justify-content-center">
        <div class="col-12 mb-5">
            <img src="https://images.openai.com/static-rsc-4/WptEihWiQZL4n6PPGg9jQcJ34UeF08elRJkAA4lXBOGATufASSLdSui3vKQSBvXyG1jKAau81tYoR0DIHZHP9kEohK2DNL9ClfVCoUGmbn8nFlvRd6aLyXaKhsBnKNXBme31DDf_NMJb5Wmhzclh9fRfSRHLxk96bc0zoJ4OdiHfewDzjOE4RtrC5Ta-BO_3?purpose=fullsize"
                 alt="起源">
        </div>
        <div class="col-12 col-lg-8">
            <span class="section-number">HISTORY</span>
            <h2>起源與發展</h2>
            <p>阿比西尼亞貓的起源仍存在爭議（舊稱阿比西尼亞）。
                19 世紀英國將非洲與印度洋地區的貓帶回歐洲後逐步繁育，
                最終形成現今的品種標準。</p>
        </div>
    </div>

    <div class="row breed-item justify-content-center">
        <div class="col-12">
            <img src="https://images.openai.com/static-rsc-4/aZf65nBVHLv7ra8U-nDCsomwI8igpwGUywozmWAHVVG6oGshC5keSK3p9jkeHXJ6i10Eee24oEf_mza--QrYS94I4e9onIyjlsHlAoMUUrEPLqn0cDgeJ885S2jaWPm3e8mo9aFEl4upRoE0ScYvcJDetgcKfmnl5XUpTB15JCSVmokc8-n-Yc3HyufGulTQ?purpose=fullsize"
                 alt="外觀">
        </div>
        <div class="col-12 col-lg-8">
            <span class="section-number">LOOK</span>
            <h2>外觀特徵</h2>
            <ul class="feature-list list-unstyled">
                <li>獨特「滴答毛」（每根毛多色層次）</li>
                <li>修長且肌肉感身體</li>
                <li>大耳朵與杏仁形眼睛</li>
                <li>毛色常見：Ruddy、Blue、Fawn</li>
                <li>整體外型類似小型野貓</li>
            </ul>
        </div>
    </div>

    <div class="breed-stats">
        <div class="stat-item">
            <span class="icon">📏</span>
            <div>
                <h5>體型</h5>
                <p>中型修長</p>
            </div>
        </div>

        <div class="stat-item">
            <span class="icon">⏳</span>
            <div>
                <h5>壽命</h5>
                <p>12～15年</p>
            </div>
        </div>

        <div class="stat-item">
            <span class="icon">⚖️</span>
            <div>
                <h5>體重</h5>
                <p>3～5kg</p>
            </div>
        </div>

        <div class="stat-item">
            <span class="icon">❤️</span>
            <div>
                <h5>性格</h5>
                <p>活潑聰明</p>
            </div>
        </div>
    </div>

    <div class="breed-ending mt-5">
        <h2>「最具野性優雅的智慧貓」</h2>
        <p>阿比西尼亞貓以活力、智慧與優雅外型著稱，是極具互動性的伴侶貓種。</p>
    </div>

</div>

<script src="js/bootstrap.js"></script>
</body>
</html>
