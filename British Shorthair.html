<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>英國短毛貓（British Shorthair）</title>
    <link rel="stylesheet" href="about-cat/British%20Shorthair.css">


</head>
<body>
<div class="container py-5">

    <div class="row breed-item justify-content-center">
        <div class="col-12 mb-5">
            <img src="https://images.openai.com/static-rsc-4/NlW_gtSdMOaikCyEtt6Mr3iMSgXP9KPPp_uZjy39t_7sq-2NdYCykq5ET1B37kbyDT1uMimhPZhiLhfP8jemI03l57CxkcvaJxZAy_CwG0GMYsX2oCr6GtK-h5kZBu7dceWe1LVArRHjP0fNvYWGCjpfKy6vsVe3OWw04KwsZ3JJQamE_ehhz1B8NA4bVUUO?purpose=fullsize"
                 alt="起源">
        </div>
        <div class="col-12 col-lg-8">
            <span class="section-number">HISTORY</span>
            <h2>起源與發展</h2>
            <p>英國短毛貓歷史可追溯至羅馬時代，作為捕鼠貓被帶入英國。</p>
        </div>
    </div>

    <div class="row breed-item justify-content-center">
        <div class="col-12">
            <img src="https://images.openai.com/static-rsc-4/0aCsM1KkZUeg57q8ri4iu4v8hpAEWI2-i_suud3IoZBmhOObrEku-zaDgol6XTo1wgMmQrkNyyoVKSI3rBVy0vwhmBBU3i3mIIIULQD8wd23yQbYsQ6jRDBaYWSMryBb6eyGM6TeAIxDuk-U5VlBhpWAA_dZjTmhJrCq8_zMBpl5T4WRZiyTLl-BD3QHWNYK?purpose=fullsize"
                 alt="外觀">
        </div>
        <div class="col-12 col-lg-8">
            <span class="section-number">LOOK</span>
            <h2>外觀特徵</h2>
            <ul class="feature-list list-unstyled">
                <li>圓臉與豐滿雙頰</li>
                <li>大而圓的眼睛</li>
                <li>短而濃密雙層毛</li>
                <li>四肢粗壯</li>
                <li>藍灰色最具代表性</li>
            </ul>
        </div>
    </div>

    <div class="breed-stats">
        <div class="stat-item">
            <span class="icon">📏</span>
            <div>
                <h5>體型</h5>
                <p>中大型</p>
            </div>
        </div>

        <div class="stat-item">
            <span class="icon">⏳</span>
            <div>
                <h5>壽命</h5>
                <p>12~20年</p>
            </div>
        </div>

        <div class="stat-item">
            <span class="icon">⚖️</span>
            <div>
                <h5>體重</h5>
                <p>3.5~7.5kg</p>
            </div>
        </div>

        <div class="stat-item">
            <span class="icon">❤️</span>
            <div>
                <h5>性格</h5>
                <p>溫和穩重</p>
            </div>
        </div>
    </div>

    <div class="breed-ending mt-5">
        <h2>「溫柔而獨立的陪伴者」</h2>
        <p>英國短毛貓不需要過度關注，卻總能默默陪伴在你身邊。</p>
    </div>

</div>

<script src="js/bootstrap.js"></script>

</html>
