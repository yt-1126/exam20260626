<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>德文捲毛貓（Devon Rex）</title>
    <link rel="stylesheet" href="about-cat/Devon Rex.css">
</head>
<body>

<div class="container py-5">
    <div class="row breed-item justify-content-center">
        <div class="col-12 mb-5">
            <img src="https://images.openai.com/static-rsc-4/yhWyIsw3kLDIzwDUmuprF959dOrx-PgOZhS8AYhzn-Y4Taego3_MU4DK3Dx32-RzmBBg4gRupehNvCjy2YW32pqe0Hdgo8BmKT4O6HLUvpXpavwADawIhf1MBCfPaHEIeM49_aM4UD0MIUhCZ44BfMqDRsJ6jXxNXVKT3DEdgY8Pu1njgXhjZt1XGfIxGV03?purpose=fullsize"
                 alt="起源">
        </div>
        <div class="col-12 col-lg-8">
            <span class="section-number">HISTORY</span>
            <h2>起源與發展</h2>
            <p> 德文捲毛貓最早於1960年在德文郡被發現，
                一隻具有捲毛基因的野生貓誕生。
                初期被誤認為與柯尼斯捲毛貓相關，
                後續研究證實為不同基因突變，並獨立成為品種。</p>
        </div>
    </div>

    <div class="row breed-item justify-content-center">
        <div class="col-12">
            <img src="https://images.openai.com/static-rsc-4/e3rZZr5-iSUtNiVJLxFUoXKYlZ3WGtVPAx25ALLvEmDf2MqNZi8kg8YHtY0tH9EGCC3ReiP1rvefejE0xi37hJghotG8oMqvikIH7pBgQIzXkmv8A4N94PpsSh5B9kQrYfgugO1VC4STIutSovYqjwOucsgzFbWhrTXjbkxQBPKYbMs7yduHX0ANI7XFNB7n?purpose=fullsize"
                 alt="外觀">
        </div>
        <div class="col-12 col-lg-8">
            <span class="section-number">LOOK</span>
            <h2>外觀特徵</h2>
            <ul class="feature-list list-unstyled">
                <li>短而柔軟的捲曲毛髮</li>
                <li>大耳朵與「精靈臉」</li>
                <li>顴骨高、臉部細長</li>
                <li>毛量較少但有波浪感</li>
                <li>體態輕盈靈活</li>
            </ul>
        </div>
    </div>

    <div class="breed-stats">
        <div class="stat-item">
            <span class="icon">📏</span>
            <div>
                <h5>體型</h5>
                <p>小型～中型</p>
            </div>
        </div>

        <div class="stat-item">
            <span class="icon">⏳</span>
            <div>
                <h5>壽命</h5>
                <p>9～15年</p>
            </div>
        </div>

        <div class="stat-item">
            <span class="icon">⚖️</span>
            <div>
                <h5>體重</h5>
                <p>2.5～4.5kg</p>
            </div>
        </div>

        <div class="stat-item">
            <span class="icon">❤️</span>
            <div>
                <h5>性格</h5>
                <p>活潑黏人</p>
            </div>
        </div>
    </div>

    <div class="breed-ending mt-5">
        <h2>「最像小精靈的貓咪」</h2>
        <p>德文捲毛貓以獨特外型與黏人性格著稱，是最具互動性的貓種之一。</p>
    </div>

</div>

<script src="js/bootstrap.js"></script>
</body>
</html>
