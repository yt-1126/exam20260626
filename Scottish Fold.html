<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>蘇格蘭摺耳貓（Scottish Fold）</title>
    <link rel="stylesheet" href="about-cat/Scottish Fold.css">
</head>
<body>

<div class="container py-5">
    <div class="row breed-item justify-content-center">
        <div class="col-12 mb-5">
            <img src="https://images.openai.com/static-rsc-4/hdtSBs_eGLPAgnrSOK1FJCn70RYi9ubyTPizaLmLARjgirtPXsWxkZBaUBrRF3M8DNiZiXxa670RHhVCdh9g3X0Zu3Boqt2Otg2YUlIFSLlAUi3P4exVPXtAI1ikCBLIP-h3lSw77505IiH2DVouulnfkhIiWPVhCbroPqkPlWg50U_Td9oCkxXRdW3JTFwr?purpose=fullsize"
                 alt="起源">
        </div>
        <div class="col-12 col-lg-8">
            <span class="section-number">HISTORY</span>
            <h2>起源與發展</h2>
            <p>蘇格蘭摺耳貓最早於1961年在蘇格蘭被發現，
                一隻名為「Susie」的白色母貓天生擁有摺耳特徵。
                後續繁育研究使這個基因被固定下來，
                並於1966年正式命名為 Scottish Fold。</p>
        </div>
    </div>

    <div class="row breed-item justify-content-center">
        <div class="col-12">
            <img src="https://images.openai.com/static-rsc-4/WpvecG8b8YqykB79HqbgjePvf17G52AE63Ue8v8N8xBKS1dhSCqWrAdvw4VB-xs5eWBZvNl5bp0rY_5ccG965EzbKts8Yvf0BqqCwHzmzWbAr8P51CTFpG8TOnL5hoLAC14KoLYQJ82003eQJ-qFh2jnvxOaeo64JcPR663tyDbPq_zsru28y2Vl-01AHZe-?purpose=fullsize"
                 alt="外觀">
        </div>
        <div class="col-12 col-lg-8">
            <span class="section-number">LOOK</span>
            <h2>外觀特徵</h2>
            <ul class="feature-list list-unstyled">
                <li>向前摺疊的耳朵（核心特徵）</li>
                <li>圓臉與圓眼睛</li>
                <li>短鼻與柔和五官</li>
                <li>身體圓潤結實</li>
                <li>短毛與長毛皆有</li>
            </ul>
        </div>
    </div>

    <div class="breed-stats">
        <div class="stat-item">
            <span class="icon">📏</span>
            <div>
                <h5>體型</h5>
                <p>中型圓潤</p>
            </div>
        </div>

        <div class="stat-item">
            <span class="icon">⏳</span>
            <div>
                <h5>壽命</h5>
                <p>11～15年</p>
            </div>
        </div>

        <div class="stat-item">
            <span class="icon">⚖️</span>
            <div>
                <h5>體重</h5>
                <p>2.5～6kg</p>
            </div>
        </div>

        <div class="stat-item">
            <span class="icon">❤️</span>
            <div>
                <h5>性格</h5>
                <p>安靜溫順</p>
            </div>
        </div>
    </div>

    <div class="breed-ending mt-5">
        <h2>「最療癒的圓臉摺耳貓」</h2>
        <p> 蘇格蘭摺耳貓以可愛外型與溫柔性格著稱，是人氣極高的室內伴侶貓。</p>
    </div>

</div>

<script src="js/bootstrap.js"></script>
</body>
</html>
